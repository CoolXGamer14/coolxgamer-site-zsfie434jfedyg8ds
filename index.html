<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceID to UniverseID</title>
    <style>
        /* Pwoofy Style Theme Variables */
        :root {
            --bg-color: #0b0b0c;
            --panel-bg: #16161a;
            --input-bg: #202024;
            --accent-purple: #bca0ff;
            --accent-hover: #a382f7;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-purple);
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 12px 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Top Bar Inputs */
        .input-wrapper {
            width: 100%;
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        input {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--accent-purple);
        }

        button {
            background-color: var(--accent-purple);
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 0 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Main Output Box */
        .output-card {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Header block inside output box */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: #d1d1d6;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: var(--input-bg);
            color: var(--text-main);
        }

        /* Code/JSON container styling */
        .card-body {
            padding: 20px;
            margin: 0;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
        }

        .api-url-display {
            color: var(--text-muted);
            margin-bottom: 16px;
            word-break: break-all;
        }

        .json-payload {
            color: #ffd07b;
        }
        
        .status-msg {
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PlaceID to UniverseID</h1>
    <div class="subtitle">A tool to get the UniverseID from a PlaceID. Inspired by pwoofy.</div>

    <div class="input-wrapper">
        <input type="text" id="placeIdInput" placeholder="Enter Place ID here..." autocomplete="off">
        <button onclick="lookupUniverseId()">Fetch Data</button>
    </div>

    <div class="output-card">
        <div class="card-header">
            <div class="card-title">PlaceID ➔ UniverseID</div>
            <button class="copy-btn" onclick="copyJsonToClipboard()">Copy JSON</button>
        </div>
        <pre class="card-body"><div class="api-url-display" id="urlDisplay">https://roblox.com</div><code class="json-payload" id="jsonOutput"><span class="status-msg">{ "waiting": "Provide a PlaceID above to run query" }</span></code></pre>
    </div>
</div>

<script>
async function lookupUniverseId() {
    const input = document.getElementById('placeIdInput').value.trim();
    const urlDisplay = document.getElementById('urlDisplay');
    const jsonOutput = document.getElementById('jsonOutput');

    if (!input) {
        jsonOutput.innerHTML = `<span style="color:#ff6b6b">{ "error": "Please enter a valid Place ID" }</span>`;
        return;
    }

    // Reflecting the exact endpoint layout like the screenshot
    const nativeRobloxUrl = `/universe/v1/places/{input}/universe`;
    urlDisplay.textContent = nativeRobloxUrl;
    jsonOutput.innerHTML = `<span class="status-msg">Fetching data stream...</span>`;

    // Utilizing a proxy system to sidestep web-browser CORS blockades smoothly
    const corsProxy = "https://apis.roproxy.com";
    
    try {
        const response = await fetch(`${corsProxy}${encodeURIComponent(nativeRobloxUrl)}`);
        if (!response.ok) throw new Error(`Network status code: ${response.status}`);
        
        const data = await response.json();
        jsonOutput.textContent = JSON.stringify(data, null, 4);
    } catch (err) {
        jsonOutput.innerHTML = `<span style="color:#ff6b6b">{\n    "error": "Failed to pull API data",\n    "message": "${err.message}"\n}</span>`;
    }
}

function copyJsonToClipboard() {
    const codeContent = document.getElementById('jsonOutput').textContent;
    navigator.clipboard.writeText(codeContent);
    
    const copyBtn = document.querySelector('.copy-btn');
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = 'Copy JSON'; }, 2000);
}
</script>

</body>
</html>
